<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Publier une partie – Aventuriers du Lys</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  color:white;
  background:
    linear-gradient(rgba(5,6,18,.35), rgba(5,6,18,.75)),
    url("table-fantasy.png");
  background-size:cover;
  background-position:center;
  background-attachment: fixed;
}

.container{
  max-width:900px;
  margin:60px auto;
  background:rgba(10,15,30,.85);
  padding:40px;
  border-radius:18px;
  border:1px solid rgba(148,163,184,.22);
}

h1{margin-top:0}

label{
  display:block;
  margin-top:18px;
  font-size:14px;
  color:rgba(229,231,235,.95);
}

input, textarea, select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:10px;
  border:0;
  outline:none;
}

textarea{resize:vertical}

.row2{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
}

button{
  margin-top:25px;
  padding:12px 18px;
  border-radius:12px;
  border:0;
  background:#4fd1c5;
  color:black;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>
  
<div class="container">
  
  <p style="margin:20px;">
<a href="index.html">← Retour à l’accueil</a>
</p>
  
  <h1>Publier une partie</h1>
  <p style="margin-top:10px; margin-bottom:20px;">
  <a href="index.html" style="color:white; text-decoration:none; margin-right:15px;">Accueil</a>
  <a href="conditions.html" style="color:white; text-decoration:none;">Conditions d’utilisation</a>
</p>

  <form action="mailto:flag2670@gmail.com" method="post" enctype="text/plain">

    <label>Pseudo du MJ</label>
<input name="PseudoMJ" placeholder="ex: Le Sage Licorne" />

    <label>Titre de la partie</label>
    <input name="Titre" placeholder="ex: La Crypte de l'Ankou" />

    <label>Système</label>
    <select name="Système">
      <option>D&D</option>
      <option>Pathfinder</option>
      <option>VtM</option>
      <option>Cthulhu</option>
      <option>Marvel/DC</option>
      <option>Cyberpunk</option>
      <option>Shadowrun</option>
      <option>Autre</option>
    </select>

    <label>Langue de la table</label>
    <select name="Langue">
      <option>FR</option>
      <option>EN</option>
      <option>BIL</option>
    </select>

    <label>Prix par joueur / séance</label>
    <div class="row2">
      <select name="Montant">
        <option value="5">5</option>
        <option value="10">10</option>
        <option value="12">12</option>
        <option value="15">15</option>
        <option value="18">18</option>
        <option value="20" selected>20</option>
        <option value="22">22</option>
        <option value="25">25</option>
        <option value="30">30</option>
        <option value="35">35</option>
        <option value="40">40</option>
        <option value="50">50</option>
      </select>

      <select name="Devise">
        <option value="CAD" selected>CAD</option>
        <option value="USD">USD</option>
        <option value="EUR">EUR</option>
      </select>
    </div>

    <label>Date de début</label>
<input type="date" name="DateDébut" />

<label>Heure</label>
<input type="time" name="Heure" />

<label>Fréquence</label>
<select name="Fréquence">
  <option value="one-shot">One-shot</option>
  <option value="hebdomadaire">Hebdomadaire</option>
  <option value="bi-hebdo">Bi-hebdo (1 semaine sur 2)</option>
  <option value="mensuel">Mensuel</option>
  <option value="ponctuel">Ponctuel / irrégulier</option>
</select>

<label>Fuseau horaire</label>
<select name="Timezone">
  <option value="America/Montreal" selected>America/Montreal (Québec)</option>
  <option value="America/New_York">America/New_York</option>
  <option value="America/Toronto">America/Toronto</option>
  <option value="America/Chicago">America/Chicago</option>
  <option value="America/Denver">America/Denver</option>
  <option value="America/Los_Angeles">America/Los_Angeles</option>
  <option value="Europe/Paris">Europe/Paris</option>
  <option value="Europe/London">Europe/London</option>
  <option value="UTC">UTC</option>
</select>

    <label>Plateformes utilisées</label>
    <input name="Plateformes" placeholder="ex: Discord + Foundry (ou autre)" />

    <label>Description</label>
    <textarea name="Description" rows="6" placeholder="Pitch, ton, niveau, durée, places..."></textarea>

    <button type="submit">Envoyer la demande</button>
  </form>
</div>

</body>
</html>
